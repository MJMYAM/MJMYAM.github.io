  .cd{display:flex;justify-content:center;gap:7px;position:relative;z-index:1;margin-bottom:13px;}
  .cd .seg{flex:1;max-width:74px;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(240,194,75,.16);border-radius:11px;padding:7px 2px 5px;}

  .cd.livebox{font-family:"Changa";font-weight:800;font-size:17px;color:#ff6b6b;padding:10px;}
  .meta{position:relative;z-index:1;border-top:1px solid rgba(255,255,255,.08);padding-top:10px;display:flex;flex-direction:column;gap:5px;font-size:11.5px;color:#c4cbe6;}
  .meta div{display:flex;align-items:center;gap:6px;justify-content:center;text-align:center;}
  .meta b{color:#fff;font-weight:700;}
  .done{text-align:center;padding:24px 6px;position:relative;z-index:1;}
  .done .t{font-family:"Changa";font-weight:800;font-size:17px;color:var(--gold);}
  .done .s{font-size:12px;color:#aab2d0;margin-top:6px;}

function codeEmoji(c){
  if(!c) return "🏳️";
  if(SPECIAL[c]) return SPECIAL[c];
  if(c.length!==2) return "🏳️";
  var A=0x1F1E6, u=c.toUpperCase();
  return String.fromCodePoint(A+u.charCodeAt(0)-65, A+u.charCodeAt(1)-65);
}
function kickoff(m){ return new Date(m.d+"T"+m.t+":00+03:00").getTime(); }
function pad(n){ return (n<10?"0":"")+n; }
function fmtT(t){ var p=t.split(":"),hh=+p[0]; var ap=hh>=12?"م":"ص"; var h12=hh%12; if(h12===0)h12=12; return h12+":"+p[1]+" "+ap; }
function fmtD(d){ var x=new Date(d+"T12:00:00"); return WD[x.getDay()]+" "+x.getDate()+" "+MO[x.getMonth()]; }
function flagCell(name){
  var c=ISO[name];
  if(c){ var em=codeEmoji(c);

  return '<span class="fl tbd">🏳️</span>';
}
function shortName(name){ var m=/المباراة\s*(\d+)/.exec(name||""); return m?("الفائز من م"+m[1]):name; }
function pickMatch(){
  var now=Date.now(), LIVE_MS=2.5*3600*1000;
  var arr=MATCHES.slice().sort(function(a,b){return kickoff(a)-kickoff(b);});
  for(var i=0;i<arr.length;i++){ if(now < kickoff(arr[i])+LIVE_MS) return arr[i]; }
  return null;
}
function render(){
  var w=document.getElementById("w"), m=pickMatch();
  if(!m){ w.innerHTML='<div class="done"><div class="t">🏆 انتهت البطولة</div><div class="s">كأس العالم 2026</div></div>'; return; }

  var st=STADIUMS[m.s]||{}, sn=st.sn||st.n||"", city=st.c||"";

      +'<div class="seg"><b>'+pad(hrs)+'</b><span>ساعة</span></div>'
      +'<div class="seg"><b>'+pad(mins)+'</b><span>دقيقة</span></div>'
      +'<div class="seg"><b>'+pad(secs)+'</b><span>ثانية</span></div></div>';
  }
